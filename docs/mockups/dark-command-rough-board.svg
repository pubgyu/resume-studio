<svg width="1600" height="1280" viewBox="0 0 1600 1280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1016"/>
      <stop offset="1" stop-color="#111621"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 220) rotate(35) scale(420 220)">
      <stop stop-color="#6E7CFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#6E7CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1320 980) rotate(-20) scale(360 220)">
      <stop stop-color="#4E90FF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#4E90FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FAF7F2"/>
      <stop offset="1" stop-color="#F1EAE2"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="panelShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <filter id="paperShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <style>
      .label { font: 700 18px 'Noto Sans KR', sans-serif; fill: #F4F7FB; letter-spacing: 0.04em; }
      .small { font: 600 12px 'Noto Sans KR', sans-serif; fill: #8F9AB0; letter-spacing: 0.14em; }
      .title { font: 800 34px 'Noto Sans KR', sans-serif; fill: #F6F8FC; }
      .body { font: 500 18px 'Noto Sans KR', sans-serif; fill: #9EA8BA; }
      .meta { font: 600 12px 'Noto Sans KR', sans-serif; fill: #AAB3C3; letter-spacing: 0.06em; }
      .chip { font: 700 12px 'Noto Sans KR', sans-serif; fill: #F8FBFF; }
      .tiny { font: 600 11px 'Noto Sans KR', sans-serif; fill: #7F8A9E; letter-spacing: 0.1em; }
      .button { font: 700 15px 'Noto Sans KR', sans-serif; fill: #111621; }
      .buttonGhost { font: 700 14px 'Noto Sans KR', sans-serif; fill: #F3F6FA; }
    </style>
  </defs>

  <rect width="1600" height="1280" fill="url(#bg)"/>
  <rect width="1600" height="1280" fill="url(#glowBlue)"/>
  <rect width="1600" height="1280" fill="url(#glowBlue2)"/>

  <text x="72" y="72" class="label">ROUGH MOCKUP BOARD</text>
  <text x="72" y="104" class="body">Dark Command Workspace / Raycast-like hierarchy / less UI / darker palette</text>

  <!-- PC LOGIN FRAME -->
  <g transform="translate(72 148)">
    <rect width="700" height="470" rx="28" fill="#10151E" stroke="rgba(255,255,255,0.08)" filter="url(#softShadow)"/>
    <text x="28" y="34" class="small">PC LOGIN</text>

    <rect x="28" y="52" width="644" height="62" rx="22" fill="rgba(22,28,38,0.76)" stroke="rgba(255,255,255,0.08)"/>
    <text x="52" y="90" class="label" style="font-size:16px;">Resume Room</text>
    <rect x="576" y="68" width="64" height="30" rx="15" fill="#151B24" stroke="rgba(255,255,255,0.08)"/>

    <text x="42" y="180" class="small">RESUME ROOM</text>
    <text x="42" y="230" class="title">이력서를 저장하고</text>
