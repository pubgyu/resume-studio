  <!-- NOTES -->
  <g transform="translate(1028 680)">
    <rect width="500" height="520" rx="28" fill="#10151E" stroke="rgba(255,255,255,0.08)" filter="url(#softShadow)"/>
    <text x="28" y="36" class="small">REVISED PRINCIPLES</text>
    <text x="28" y="94" class="title" style="font-size:28px;">더 적은 UI, 더 강한 위계</text>

