      <rect x="390" y="202" width="52" height="8" rx="4" fill="#B9C1CF"/>
      <circle cx="490" cy="192" r="18" fill="#E9EDF3"/>
      <rect x="390" y="232" width="108" height="6" rx="3" fill="#D4DBE5"/>
      <rect x="390" y="244" width="120" height="6" rx="3" fill="#D4DBE5"/>
      <rect x="390" y="270" width="110" height="54" rx="14" fill="#EEF2F6"/>
      <rect x="404" y="286" width="58" height="8" rx="4" fill="#3A4250"/>
      <rect x="404" y="304" width="82" height="6" rx="3" fill="#CED6E1"/>
      <rect x="404" y="316" width="90" height="6" rx="3" fill="#CED6E1"/>
      <rect x="390" y="340" width="52" height="6" rx="3" fill="#D4DBE5"/>
    </g>

    <rect x="520" y="154" width="140" height="190" rx="24" fill="#151B24" stroke="rgba(255,255,255,0.08)" filter="url(#panelShadow)"/>
    <text x="546" y="192" class="small">GOOGLE</text>
    <text x="546" y="232" class="title" style="font-size:28px;">시작</text>
    <text x="546" y="266" class="body" style="font-size:16px;">짧은 설명 두 줄</text>
    <text x="546" y="288" class="body" style="font-size:16px;">만 남긴다</text>
    <rect x="546" y="306" width="88" height="42" rx="18" fill="#E8A978"/>
    <text x="571" y="333" class="button">로그인</text>
  </g>

