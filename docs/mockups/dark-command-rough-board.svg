    <text x="28" y="240" class="body" style="font-size:18px;">4. 글로우는 배경에만 약하게</text>
    <text x="28" y="272" class="body" style="font-size:18px;">5. Raycast식 빠른 액션 우선</text>

    <rect x="28" y="320" width="444" height="164" rx="22" fill="#151B24" stroke="rgba(255,255,255,0.08)"/>
