    <rect x="328" y="424" width="70" height="40" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
    <text x="351" y="449" class="buttonGhost" style="font-size:13px;">PDF</text>
