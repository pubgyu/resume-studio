    <line x1="54" y1="184" x2="350" y2="184" stroke="rgba(255,255,255,0.08)"/>
    <text x="54" y="214" class="kicker" style="letter-spacing:0.04em;">SECTIONS</text>

    <rect x="48" y="228" width="308" height="40" rx="10" fill="rgba(255,255,255,0.10)"/>
    <text x="70" y="253" class="row">기본 정보</text>
    <text x="298" y="253" class="tag">Edit</text>

    <rect x="48" y="274" width="308" height="40" rx="10" fill="rgba(255,255,255,0.03)"/>
    <text x="70" y="299" class="row" style="fill:#CBD3E1;">경력</text>
    <text x="298" y="299" class="tag">Edit</text>

    <rect x="48" y="320" width="308" height="40" rx="10" fill="rgba(255,255,255,0.03)"/>
    <text x="70" y="345" class="row" style="fill:#CBD3E1;">프로젝트</text>
    <text x="298" y="345" class="tag">Edit</text>

    <rect x="48" y="366" width="308" height="40" rx="10" fill="rgba(255,255,255,0.03)"/>
    <text x="70" y="391" class="row" style="fill:#CBD3E1;">학력</text>
    <text x="298" y="391" class="tag">Edit</text>

    <circle cx="690" cy="306" r="130" fill="rgba(110,124,255,0.12)"/>
    <g filter="url(#softShadow)">
      <rect x="468" y="164" width="396" height="270" rx="24" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
    </g>
    <g filter="url(#shellShadow)">
      <rect x="540" y="132" width="264" height="336" rx="20" fill="url(#paper)"/>
      <rect x="574" y="166" width="110" height="10" rx="5" fill="#343A47"/>
      <rect x="574" y="184" width="64" height="8" rx="4" fill="#B9C1CF"/>
      <circle cx="744" cy="178" r="18" fill="#E7EAF0"/>
      <rect x="574" y="220" width="164" height="6" rx="3" fill="#D6DCE6"/>
      <rect x="574" y="232" width="176" height="6" rx="3" fill="#D6DCE6"/>
      <rect x="574" y="260" width="176" height="64" rx="14" fill="#ECEFF4"/>
      <rect x="590" y="278" width="74" height="8" rx="4" fill="#3A4250"/>
      <rect x="590" y="296" width="124" height="6" rx="3" fill="#CED6E1"/>
      <rect x="590" y="308" width="132" height="6" rx="3" fill="#CED6E1"/>
      <rect x="574" y="346" width="80" height="6" rx="3" fill="#D6DCE6"/>
      <rect x="574" y="360" width="158" height="6" rx="3" fill="#D6DCE6"/>
      <rect x="574" y="374" width="144" height="6" rx="3" fill="#D6DCE6"/>
      <rect x="574" y="402" width="96" height="6" rx="3" fill="#D6DCE6"/>
    </g>
  </g>

  <!-- MOBILE -->
  <g transform="translate(1090 640)">
    <rect width="438" height="500" rx="30" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" filter="url(#shellShadow)"/>
    <text x="24" y="30" class="kicker">MOBILE / SINGLE SHEET FEEL</text>

    <rect x="32" y="52" width="374" height="54" rx="18" fill="rgba(14,18,26,0.88)" stroke="rgba(255,255,255,0.08)"/>
    <text x="54" y="86" class="row">← 박규태-이력서</text>
    <text x="300" y="86" class="meta">저장됨</text>
    <text x="370" y="86" class="row">⋯</text>

    <rect x="32" y="122" width="200" height="40" rx="20" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)"/>
    <rect x="36" y="126" width="94" height="32" rx="16" fill="#E8A978"/>
    <text x="67" y="147" class="button">편집</text>
    <text x="156" y="147" class="buttonGhost" style="font-size:13px;">미리보기</text>

    <rect x="32" y="184" width="374" height="212" rx="22" fill="rgba(8,10,14,0.86)" stroke="rgba(255,255,255,0.08)"/>
    <rect x="33" y="185" width="372" height="210" rx="21" fill="url(#redBloom)" opacity="0.52"/>
    <text x="54" y="214" class="body">Edit current section...</text>
    <line x1="54" y1="230" x2="384" y2="230" stroke="rgba(255,255,255,0.08)"/>
    <rect x="48" y="248" width="342" height="40" rx="10" fill="rgba(255,255,255,0.10)"/>
    <text x="68" y="273" class="row">기본 정보</text>
    <rect x="48" y="294" width="342" height="40" rx="10" fill="rgba(255,255,255,0.03)"/>
    <text x="68" y="319" class="row" style="fill:#CDD5E3;">경력</text>
    <rect x="48" y="340" width="342" height="40" rx="10" fill="rgba(255,255,255,0.03)"/>
    <text x="68" y="365" class="row" style="fill:#CDD5E3;">프로젝트</text>

    <rect x="32" y="416" width="374" height="56" rx="22" fill="rgba(20,26,36,0.90)" stroke="rgba(255,255,255,0.08)"/>
    <rect x="40" y="424" width="154" height="40" rx="18" fill="#E8A978"/>
    <text x="101" y="449" class="button">저장</text>
    <rect x="202" y="424" width="118" height="40" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
